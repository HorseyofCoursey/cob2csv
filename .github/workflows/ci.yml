name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: sudo apt-get install -y gnucobol

      - name: Build
        run: make

      - name: Test
        run: make test
